name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_action.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag_action
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

  build:
    name: Build (${{ matrix.target }})
    needs: tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: puppetmaster-linux-x86_64
            asset_name: puppetmaster-linux-x86_64.tar.gz
            binary_name: puppetmaster
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: puppetmaster-windows-x86_64
            asset_name: puppetmaster-windows-x86_64.zip
            binary_name: puppetmaster.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: puppetmaster-macos-x86_64
            asset_name: puppetmaster-macos-x86_64.tar.gz
            binary_name: puppetmaster
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: puppetmaster-macos-aarch64
            asset_name: puppetmaster-macos-aarch64.tar.gz
            binary_name: puppetmaster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset_name }} ${{ matrix.binary_name }}
          cd -

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.asset_name }} ${{ matrix.binary_name }}
          cd ../../../

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          files: |
            artifacts/puppetmaster-linux-x86_64/puppetmaster-linux-x86_64.tar.gz
            artifacts/puppetmaster-windows-x86_64/puppetmaster-windows-x86_64.zip
            artifacts/puppetmaster-macos-x86_64/puppetmaster-macos-x86_64.tar.gz
            artifacts/puppetmaster-macos-aarch64/puppetmaster-macos-aarch64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
