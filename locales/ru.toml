[bot]
welcome = """
Добро пожаловать в OpenCode Telegram Bot! 🤖

Я помогаю запускать и отслеживать задачи AI-программирования из Telegram.

Команды:
/status - Информация о сервере и сессии
/new - Создать новую сессию
/sessions - Список недавних сессий
/projects - Переключить проекты
/commands - Запустить команды
/help - Показать все команды

Отправьте любое сообщение, чтобы начать программировать!
"""
session_created = "✅ Новая сессия создана"
session_switched = "✅ Переключено на сессию: {title}"
